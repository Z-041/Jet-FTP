# FTP Server Configuration File
# 服务器配置

# 基本配置
server.port=21
server.rootDirectory=ftp-root
server.maxConnections=10
server.timeoutSeconds=300

# 网络配置 (IPv4/IPv6双栈)
# bindAddress: 监听地址
#   :: = 双栈 (IPv4 + IPv6) [推荐]
#   0.0.0.0 = 仅IPv4
#   ::1 = 仅IPv6 loopback
#   具体IP = 绑定到指定地址
server.bindAddress=::

# dualStackEnabled: 是否启用双栈模式
#   true = 同时监听所有网卡的IPv4和IPv6地址
#   false = 只监听bindAddress指定的地址
server.dualStackEnabled=true

# listenInterface: 指定监听的网卡接口名称
#   auto = 自动选择所有可用网卡
#   eth0, en0, wlan0 等 = 指定具体网卡
server.listenInterface=auto

# preferIPv6: 是否优先使用IPv6（在被动模式下）
#   true = 优先返回IPv6地址给客户端
#   false = 优先返回IPv4地址 [默认]
server.preferIPv6=false

# 线程池配置
server.threadPool.coreSize=10
server.threadPool.keepAliveSeconds=60
server.threadPool.queueCapacity=100

# 日志配置
log.level=DEBUG
log.filePath=logs/ftp-server.log

# 被动模式配置 (Passive Mode Configuration)
# 外部 IP 地址配置 - 支持分别配置IPv4和IPv6
# passiveMode.externalIp: 旧版兼容配置（仅IPv4）
passiveMode.externalIp=auto

# IPv4外部IP地址 - 用于被动模式下返回给IPv4客户端
#   auto = 自动检测最佳IPv4地址
#   0.0.0.0 = 禁用自动检测
#   具体IP如 203.0.113.10 = 使用指定的公网IP
passiveMode.ipv4ExternalIp=auto

# IPv6外部IP地址 - 用于被动模式下返回给IPv6客户端
#   auto = 自动检测最佳IPv6地址
#   :: = 禁用自动检测
#   具体IP如 2001:db8::1 = 使用指定的全局IPv6地址
passiveMode.ipv6ExternalIp=auto

# 被动模式端口范围 - 建议设置固定范围以便配置防火墙
# Windows 防火墙命令：netsh advfirewall firewall add rule name="FTP Passive" dir=in action=allow protocol=TCP localport=50000-50100
passiveMode.portMin=50000
passiveMode.portMax=51000

# 被动模式连接超时（秒）
passiveMode.connectionTimeout=30
